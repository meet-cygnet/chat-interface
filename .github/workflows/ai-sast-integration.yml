name: AI-SAST Security Scanner

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Perform Semgrep Analysis
        run: semgrep scan --config auto --sarif --output=semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
    
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python # Change to javascript, go, etc. as appropriate

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          upload: false
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif
          path: codeql-results

  parse-findings:
    name: Parse Scans & Normalize Findings (${{ matrix.tool }})
    runs-on: ubuntu-latest
    needs: [semgrep, codeql]
    strategy:
      fail-fast: false
      matrix:
        tool: 
          - semgrep
          - codeql
    
    # Run directly inside the pre-built AI-SAST Docker CLI container
    container:
      image: ghcr.io/meet-cygnet/ai-sast:latest

    env:
      FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
      FOUNDRY_BASE_URL: ${{ secrets.FOUNDRY_BASE_URL }}

    steps:
      - name: Download ${{ matrix.tool }} SARIF
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.tool }}-sarif
          path: ./raw-results

      - name: Parse & Normalize Reports
        id: parse
        run: |
          echo "=== Parsing ${{ matrix.tool }} Findings ==="
          sarif_file=$(find raw-results -name "*.sarif" | head -n 1)
          if [ -n "$sarif_file" ]; then
            ai-sast parse "$sarif_file" -o ./
          else
            echo "No SARIF report found for ${{ matrix.tool }}."
            exit 1
          fi

          echo "=== Generated Normalized Artifacts ==="
          ls -la ai-sast-normalized-*.json

          norm_file=$(ls ai-sast-normalized-*.json | head -n 1)
          echo "norm_file=$norm_file" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.tool }}" = "semgrep" ]; then
            echo "role=fresh-a" >> $GITHUB_OUTPUT
          else
            echo "role=fresh-b" >> $GITHUB_OUTPUT
          fi

      - name: Upload Normalized Reports
        uses: actions/upload-artifact@v7
        with:
          name: normalized-sast-reports-${{ matrix.tool }}
          path: ai-sast-normalized-*.json

      - name: Analyze normalized SAST findings
        run: |
          norm_file="${{ steps.parse.outputs.norm_file }}"
          role="${{ steps.parse.outputs.role }}"
          ai-sast analyze "$norm_file" --role "$role" -o "report_${{ matrix.tool }}.md"

      - name: Upload AI Report Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-report-${{ matrix.tool }}
          path: report_${{ matrix.tool }}.md
