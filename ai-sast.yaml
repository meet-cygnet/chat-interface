# ╔═══════════════════════════════════════════════════════════════════════════════════════════╗
# ║                                 AI-SAST PIPELINE GRAPH                                    ║
# ╠═══════════════════════════════════════════════════════════════════════════════════════════╣
# ║                                                                                           ║
# ║   [ prep ] ─────────┬──────────────┐                                                      ║
# ║                     │              │                                                      ║
# ║                     ▼              ▼                                                      ║
# ║            [ semgrep ]     [ detect-languages ]                                           ║
# ║              (Track A)             │                                                      ║
# ║                     │              ▼                                                      ║
# ║                     │         [ codeql ] (matrix)                                         ║
# ║                     │          (Track B)                                                  ║
# ║                     │              │                                                      ║
# ║                     ▼              ▼                                                      ║
# ║                  [ fresh-analysis ] (matrix)                                              ║
# ║                            │                                                              ║
# ║                            ▼                                                              ║
# ║                 [ ai-sast-consolidate ]                                                   ║
# ║                                                                                           ║
# ╚═══════════════════════════════════════════════════════════════════════════════════════════╝

name: AI-SAST Security Scanner

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

env:
  AI_SAST_ORG: ${{ github.repository_owner }}

jobs:
  # ── Prep Job ──────────────────────────────────────────────────────────────
  prep:
    name: "Prep Output Context"
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      timestamp: ${{ steps.vars.outputs.timestamp }}
    steps:
      - id: vars
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-6)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

  # ── Language Detection Job ────────────────────────────────────────────────
  detect-languages:
    name: "Detect Repo Languages"
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    outputs:
      languages: ${{ steps.detect.outputs.languages }}
    steps:
      - uses: actions/checkout@v6

      - id: detect
        run: |
          LANGS=()
          # Python
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || find . -not -path '*/.*' -not -path '*/node_modules/*' -not -path '*/venv/*' -not -path '*/.venv/*' -name "*.py" -print -quit | grep -q .; then
            LANGS+=("\"python\"")
          fi
          # JavaScript / TypeScript
          if [ -f "package.json" ] || find . -not -path '*/.*' -not -path '*/node_modules/*' -not -path '*/venv/*' -not -path '*/.venv/*' \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \) -print -quit | grep -q .; then
            LANGS+=("\"javascript\"")
          fi
          # Java
          if [ -f "pom.xml" ] || find . -not -path '*/.*' -not -path '*/node_modules/*' -name "*.java" -print -quit | grep -q .; then
            LANGS+=("\"java\"")
          fi
          # Go
          if [ -f "go.mod" ] || find . -not -path '*/.*' -not -path '*/node_modules/*' -name "*.go" -print -quit | grep -q .; then
            LANGS+=("\"go\"")
          fi
          # C#
          if find . -not -path '*/.*' -name "*.csproj" -print -quit | grep -q . || find . -not -path '*/.*' -name "*.cs" -print -quit | grep -q .; then
            LANGS+=("\"csharp\"")
          fi
          # C++
          if find . -not -path '*/.*' \( -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" -o -name "*.hpp" -o -name "*.h" -o -name "*.c" \) -print -quit | grep -q .; then
            LANGS+=("\"cpp\"")
          fi
          # Ruby
          if [ -f "Gemfile" ] || find . -not -path '*/.*' -name "*.rb" -print -quit | grep -q .; then
            LANGS+=("\"ruby\"")
          fi
          # Swift
          if [ -f "Package.swift" ] || find . -not -path '*/.*' -name "*.swift" -print -quit | grep -q .; then
            LANGS+=("\"swift\"")
          fi
          # Kotlin
          if find . -not -path '*/.*' -name "build.gradle*" -print -quit | grep -q . || find . -not -path '*/.*' -name "*.kt" -print -quit | grep -q .; then
            LANGS+=("\"kotlin\"")
          fi

          if [ ${#LANGS[@]} -eq 0 ]; then
            echo "❌ No CodeQL-supported languages detected in this repository."
            exit 1
          fi

          LANG_ARRAY=$(IFS=,; echo "${LANGS[*]}")
          echo "languages=[$LANG_ARRAY]" >> $GITHUB_OUTPUT
          echo "Detected languages: [$LANG_ARRAY]"

  # ── SAST Tool A: Semgrep ──────────────────────────────────────────────────
  semgrep:
    name: "SAST Tool A: Semgrep Scan"
    runs-on: ubuntu-latest
    needs: prep
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - uses: actions/checkout@v6

      - name: Perform Semgrep Analysis
        run: semgrep scan --config auto --sarif --output=semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: semgrep.sarif

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ── SAST Tool B: CodeQL ───────────────────────────────────────────────────
  codeql:
    name: "SAST Tool B: CodeQL Scan (${{ matrix.language }})"
    runs-on: ubuntu-latest
    needs: [prep, detect-languages]
    if: github.actor != 'dependabot[bot]'
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.detect-languages.outputs.languages) }}
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
          upload-database: false
          output: codeql-results

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v7
        with:
          # Parallel matrix uploads to the same artifact name are merged automatically by actions/upload-artifact@v7.
          name: codeql-sarif-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: codeql-results

      - name: Upload CodeQL SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: codeql-results
          category: codeql-${{ matrix.language }}

  # ── Track A & B: Parse SARIF + Fresh Model Analysis (Matrix-based) ──────────
  fresh-analysis:
    name: "Track ${{ matrix.track }}: Parse + Fresh Model (${{ matrix.tool }})"
    runs-on: ubuntu-latest
    needs: [prep, semgrep, codeql]
    if: github.actor != 'dependabot[bot]'
    # GHA does not support env context inside container image expressions; hardcoded repository_owner inline instead.
    container:
      image: ghcr.io/${{ github.repository_owner }}/ai-sast:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - track: a
            tool: semgrep
            artifact_name: semgrep-sarif
            role: fresh-a
            out_file: report_a.md
          - track: b
            tool: codeql
            artifact_name: codeql-sarif
            role: fresh-b
            out_file: report_b.md
    env:
      FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
      FOUNDRY_BASE_URL: ${{ secrets.FOUNDRY_BASE_URL }}
      FOUNDRY_DEPLOYMENT: ${{ secrets.FOUNDRY_DEPLOYMENT }}
    steps:
      - name: "Download SARIF (${{ matrix.tool }})"
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: ./sarif-inputs

      - name: "Parse: SARIF → Normalized JSON"
        id: parse
        run: |
          sarif_input=$(find ./sarif-inputs -name "*.sarif" | head -n 1)
          if [ -z "$sarif_input" ]; then
            echo "❌ No SARIF file found in ./sarif-inputs"
            exit 1
          fi
          ai-sast parse "$sarif_input" --track ${{ matrix.track }} -o ./reports/
          norm_file=$(ls reports/ai-sast-normalized-${{ matrix.track }}-*.json | head -n 1)
          echo "norm_file=$norm_file" >> $GITHUB_OUTPUT
          echo "✅ Parsed ${{ matrix.tool }} SARIF → $norm_file"

      - name: "Fresh Model: Analyze Findings"
        run: |
          ai-sast analyze "${{ steps.parse.outputs.norm_file }}" \
            --role ${{ matrix.role }} \
            -o reports/${{ matrix.out_file }}
          echo "✅ Fresh Model (${{ matrix.tool }}) → reports/${{ matrix.out_file }}"

      - name: "Upload Track Outputs"
        uses: actions/upload-artifact@v7
        with:
          name: track-${{ matrix.track }}-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: reports/

  # ── Consolidation: Counter Review (A & B) + Final Model C ────────────────
  ai-sast-consolidate:
    name: "AI-SAST: Counter Review + Final Consolidation"
    runs-on: ubuntu-latest
    needs: [prep, fresh-analysis]
    if: github.actor != 'dependabot[bot]'
    # GHA does not support env context inside container image expressions; hardcoded repository_owner inline instead.
    container:
      image: ghcr.io/${{ github.repository_owner }}/ai-sast:latest
    env:
      FOUNDRY_API_KEY: ${{ secrets.FOUNDRY_API_KEY }}
      FOUNDRY_BASE_URL: ${{ secrets.FOUNDRY_BASE_URL }}
      FOUNDRY_DEPLOYMENT: ${{ secrets.FOUNDRY_DEPLOYMENT }}
    steps:
      - name: "Download Track A outputs (report_a.md)"
        uses: actions/download-artifact@v8
        with:
          name: track-a-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: ./reports

      - name: "Download Track B outputs (report_b.md)"
        uses: actions/download-artifact@v8
        with:
          name: track-b-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: ./reports

      - name: "Cache: Restore AI-SAST Persistent Context (Memory & CVEs)"
        uses: actions/cache@v5
        with:
          path: .ai-sast/
          key: ai-sast-pipeline-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ai-sast-pipeline-${{ github.ref_name }}-
            ai-sast-pipeline-

      - name: "Counter Model A: Adversarial Review of Report B"
        run: |
          ai-sast review \
            --primary reports/report_b.md \
            --secondary reports/report_a.md \
            --role counter-a \
            -o reports/refined_b.md
          echo "✅ Counter Model A → reports/refined_b.md"

      - name: "Counter Model B: Adversarial Review of Report A"
        run: |
          ai-sast review \
            --primary reports/report_a.md \
            --secondary reports/report_b.md \
            --role counter-b \
            -o reports/refined_a.md
          echo "✅ Counter Model B → reports/refined_a.md"

      - name: "Final Model C: Consolidate All Four Reports"
        run: |
          ai-sast finalize \
            --reports "reports/report_a.md,reports/report_b.md,reports/refined_b.md,reports/refined_a.md" \
            -o reports/final-report.md
          echo "✅ Final Model C → reports/final-report.md"

      - name: "Upload: All AI-SAST Reports"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-sast-reports-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: reports/

      - name: "Upload: Final Report (standalone)"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-final-report-${{ needs.prep.outputs.sha_short }}-${{ needs.prep.outputs.timestamp }}
          path: reports/final-report.md

      - name: "Summary: Print Pipeline Results"
        if: always()
        run: |
          echo "╔════════════════════════════════════════════════╗"
          echo "║       AI-SAST Dual-Track Pipeline Complete     ║"
          echo "╠════════════════════════════════════════════════╣"
          echo "║ Reports generated:                            ║"
          echo "║   • Report A     (Fresh Model A, Track A job) ║"
          echo "║   • Report B     (Fresh Model B, Track B job) ║"
          echo "║   • Refined B    (Counter Model A)            ║"
          echo "║   • Refined A    (Counter Model B)            ║"
          echo "║   • Final Report (Final Model C / GPT-5.4)    ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "── Final Report Preview ──"
          head -80 reports/final-report.md || echo "(final report not found)"
